[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.supabase.co https://cdnjs.cloudflare.com https://api.anthropic.com https://api.openweathermap.org https://www.youtube.com https://youtube.com; frame-src 'self' blob: data: https://www.youtube.com https://youtube.com; img-src 'self' data: blob: https://*.supabase.co https://*;"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
